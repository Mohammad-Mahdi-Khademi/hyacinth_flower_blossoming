<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>For Nazanin ❤️</title>

    <link
        rel="stylesheet"
        href="style.css">

</head>

<body>

<div class="background"></div>

<div class="stars"></div>

<div class="sparkles"></div>

<div class="container">

    <div class="flower">

        <div class="stem"></div>

        <div class="leaf left"></div>
        <div class="leaf right"></div>

        <div class="hyacinth">

            <!-- Top -->

            <div class="petal p1"></div>
            <div class="petal p2"></div>
            <div class="petal p3"></div>

            <!-- Row 2 -->

            <div class="petal p4"></div>
            <div class="petal p5"></div>
            <div class="petal p6"></div>
            <div class="petal p7"></div>

            <!-- Row 3 -->

            <div class="petal p8"></div>
            <div class="petal p9"></div>
            <div class="petal p10"></div>
            <div class="petal p11"></div>
            <div class="petal p12"></div>

            <!-- Row 4 -->

            <div class="petal p13"></div>
            <div class="petal p14"></div>
            <div class="petal p15"></div>
            <div class="petal p16"></div>

            <!-- Bottom -->

            <div class="petal p17"></div>
            <div class="petal p18"></div>
            <div class="petal p19"></div>

        </div>

    </div>

    <div class="message">

        <h1>For Nazanin 💜</h1>

        <p>

            Like this Hyacinth...

            <br><br>

            My love blooms a little more every single day.

            <br><br>

            Thank you for being the most beautiful part of my life.

            <br><br>

            Forever Yours,

            <br>

            Mahdi ❤️

        </p>

    </div>

</div>

<audio id="bg-music" loop>
    <source src="oursongedited.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>

</body>
</html>
